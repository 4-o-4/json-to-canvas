<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>JSON Import</title>
    <style>
      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        padding: 16px;
      }
      h3 {
        margin: 0 0 12px;
        font-size: 14px;
      }
      textarea {
        width: 100%;
        height: 300px;
        box-sizing: border-box;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        padding: 10px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        cursor: pointer;
      }
      #importBtn {
        background: #18a0fb;
        color: white;
      }
      #loadMdBtn {
        background: #f0f0f0;
      }
      #cancelBtn {
        background: #eee;
      }
      .hint {
        margin-top: 10px;
        color: #666;
        font-size: 11px;
        line-height: 1.4;
      }
      .hint.warn {
        color: #b45309;
      }
      .hint.ok {
        color: #047857;
      }
      .field {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        font-size: 12px;
      }
      .field input[type="number"] {
        width: 72px;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 12px;
      }
      .field input[type="text"] {
        flex: 1;
        min-width: 0;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h3>JSON макета</h3>
    <textarea id="jsonInput">
[
  {
    "h1": "Заголовок H1"
  },
  {
    "h2": "Заголовок H2"
  },
  {
    "p": "Используйте этот текст как пример основного содержимого."
  },
  {
    "p": "Ещё один абзац. Он демонстрирует, как выглядят несколько абзацев подряд и как они будут переноситься внутри авто‑лейаута."
  },
  {
    "code": "print(\"Hello, World!\")"
  }
]
    </textarea>

    <div class="field">
      <label for="artboardNamePrefix">Имя артборда (префикс)</label>
      <input type="text" id="artboardNamePrefix" value="A4" placeholder="A4" />
    </div>

    <div class="field">
      <label for="artboardNumberStart">Нумерация артбордов с</label>
      <input type="number" id="artboardNumberStart" min="1" step="1" value="1" />
    </div>

    <input
      type="file"
      id="mdFileInput"
      accept=".md,.markdown,text/markdown"
      hidden
    />

    <div class="row">
      <button id="importBtn">Импортировать JSON</button>
      <button id="loadMdBtn">Загрузить .md</button>
      <button id="cancelBtn">Закрыть</button>
    </div>

    <div id="mdStatus" class="hint"></div>

    <div class="hint">
      Формат документа: <code>[ [ {"h2":"…"}, {"p":"…"}, {"code":"…"} ], … ]</code> — внутренний массив это один артборд.
    </div>

    <script>
      const jsonInput = document.getElementById("jsonInput");
      const artboardNamePrefix = document.getElementById("artboardNamePrefix");
      const artboardNumberStart = document.getElementById("artboardNumberStart");
      const importBtn = document.getElementById("importBtn");
      const loadMdBtn = document.getElementById("loadMdBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const mdFileInput = document.getElementById("mdFileInput");
      const mdStatus = document.getElementById("mdStatus");

      function getArtboardSettings() {
        const startRaw = Number(artboardNumberStart.value);
        const artboardNumberStartValue =
          Number.isFinite(startRaw) && startRaw >= 1 ? Math.floor(startRaw) : 1;
        return {
          artboardNamePrefix: artboardNamePrefix.value,
          artboardNumberStart: artboardNumberStartValue,
        };
      }

      function postToPlugin(message) {
        parent.postMessage({ pluginMessage: message }, "*");
      }

      function setMdStatus(text, kind) {
        mdStatus.textContent = text;
        mdStatus.className = "hint" + (kind ? " " + kind : "");
      }

      function readMarkdownFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result ?? ""));
          reader.onerror = () => reject(new Error("Не удалось прочитать файл"));
          reader.readAsText(file);
        });
      }

      loadMdBtn.onclick = () => {
        mdFileInput.click();
      };

      mdFileInput.onchange = async () => {
        const file = mdFileInput.files && mdFileInput.files[0];
        mdFileInput.value = "";
        if (!file) return;

        const name = file.name.toLowerCase();
        if (!name.endsWith(".md") && !name.endsWith(".markdown")) {
          setMdStatus("Выберите файл .md или .markdown", "warn");
          return;
        }

        try {
          setMdStatus("Конвертация…");
          const markdown = await readMarkdownFile(file);
          postToPlugin({
            type: "convert-markdown",
            payload: markdown,
            fileName: file.name,
          });
        } catch (error) {
          const message =
            error instanceof Error ? error.message : "Неизвестная ошибка";
          setMdStatus(message, "warn");
        }
      };

      importBtn.onclick = () => {
        postToPlugin({
          type: "import-json",
          payload: jsonInput.value,
          ...getArtboardSettings(),
        });
      };

      cancelBtn.onclick = () => {
        postToPlugin({ type: "cancel" });
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "markdown-converted") {
          jsonInput.value = msg.payload;
          const warnings = Array.isArray(msg.warnings) ? msg.warnings : [];
          if (warnings.length > 0) {
            setMdStatus(
              (msg.fileName ? msg.fileName + ": " : "") + warnings.join("; "),
              "warn"
            );
          } else {
            setMdStatus(
              (msg.fileName ? msg.fileName + " — " : "") +
                "сконвертирован, можно импортировать",
              "ok"
            );
          }
          return;
        }

        if (msg.type === "markdown-error") {
          setMdStatus(msg.message || "Ошибка конвертации", "warn");
        }
      };
    </script>
  </body>
</html>
